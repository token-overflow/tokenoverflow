name: Deploy Landing

on:
  push:
    branches: [ main ]
    paths:
      - "apps/landing/**"
      - "packages/**"
      - "bun.lock"
  workflow_dispatch:

concurrency:
  group: deploy-landing
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  LANDING_BUCKET: tokenoverflow-landing
  LANDING_DISTRIBUTION_ID: EUWMTMEBUDHNL

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-slim
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: 1.3.13

      - name: Configure AWS credentials
        if: ${{ !github.event.act }}
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7  # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build landing
        run: bun run build:landing

      - name: Sync to S3
        if: ${{ !github.event.act }}
        run: |
          aws s3 sync apps/landing/dist/ s3://${LANDING_BUCKET}/ --delete \
            --cache-control "public, max-age=300, must-revalidate"

          aws s3 cp apps/landing/dist/_astro s3://${LANDING_BUCKET}/_astro \
            --recursive --metadata-directive REPLACE \
            --cache-control "public, max-age=31536000, immutable"

      - name: Invalidate CloudFront
        if: ${{ !github.event.act }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${LANDING_DISTRIBUTION_ID}" \
            --paths "/*"
