# Unit test environment - uses MockEmbedding, no real services

[api]
host = "127.0.0.1"
port = 8080
base_url = "http://127.0.0.1:8080"
request_timeout_secs = 30

[auth]
workos_client_id = "client_test"
workos_api_url = "http://localhost:8080"
jwks_url = "file://tests/assets/auth/test_jwks.json"
jwks_cache_ttl_secs = 0
issuer = "tokenoverflow-test"
audiences = ["http://localhost:8080"]
authkit_url = "http://localhost:8080"
github_api_url = "http://localhost:8080"

[database]
host = "localhost"
port = 5432
user = "tokenoverflow"
name = "tokenoverflow"

[embedding]
model = "voyage-code-3"
output_dimension = 256
# base_url not set - uses MockEmbedding

[mcp]
base_url = "http://127.0.0.1:8080/mcp"

[logging]
level = "debug"
